# RADIUS clients — devices allowed to send Access-Requests to this server.
# The shared secret must match the value in pam_radius_auth.conf on the Raspberry Pi.

client localhost {
    ipaddr    = 127.0.0.1
    secret    = testing123
    shortname = localhost
}

client raspberry-pi {
    # TODO: replace with your Raspberry Pi's LAN IP (e.g. 192.168.1.42)
    ipaddr    = 192.168.0.119
    secret    = radius-shared-secret
    shortname = raspi
    nastype   = other
}

client docker-mac {
    # Allow requests coming from Mac Docker VM (docker proxy)
    ipaddr    = 172.16.0.0/12
    secret    = radius-shared-secret
    shortname = docker-mac
    nastype   = other
}
