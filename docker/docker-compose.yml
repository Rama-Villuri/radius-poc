services:
  freeradius:
    image: freeradius/freeradius-server:latest
    container_name: freeradius
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
    volumes:
      - ./freeradius/clients.conf:/etc/freeradius/3.0/clients.conf:ro
      - ./freeradius/users:/etc/freeradius/3.0/mods-config/files/authorize:ro
    # -X = debug mode — shows every Access-Request/Accept in the terminal, ideal for a POC
    command: freeradius -X
    restart: unless-stopped
